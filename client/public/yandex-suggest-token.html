<!DOCTYPE html>
<html>
<body>
<script>
"use strict";
window.addEventListener("message", function(e) {
  var opener = window.opener;
  if (opener && opener.postMessage) {
    opener.postMessage(e.data, e.origin);
    window.close();
  }
});
try {
  window.opener.postMessage(document.location.href, "*");
} catch(e) {}
</script>
</body>
</html>
