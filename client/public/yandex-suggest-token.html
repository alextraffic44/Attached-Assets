<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Yandex OAuth</title>
</head>
<body>
<script>
"use strict";
(function () {
  var href = document.location.href;
  var hash = document.location.hash || "";

  function finishViaOpener() {
    try {
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage(href, "*");
        window.close();
        return true;
      }
    } catch (e) {}
    return false;
  }

  if (finishViaOpener()) return;

  // Full-page fallback when popup opener is unavailable.
  try {
    if (hash && hash.indexOf("access_token") !== -1) {
      sessionStorage.setItem("yandex_oauth_hash", hash);
    }
  } catch (e) {}
  window.location.replace("/auth?yandex_callback=1");
})();
</script>
</body>
</html>
